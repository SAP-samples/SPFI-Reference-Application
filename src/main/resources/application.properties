spring.application.name=spfi-v2-ref-app
#
# Server keystore (contains server's private key and certificate)
# MTLS related properties
server.ssl.key-store=
server.ssl.key-store-password=
server.ssl.key-store-type=
server.ssl.key-alias=

# Trust store (contains trusted client certificates)
server.ssl.trust-store=
server.ssl.trust-store-password=
server.ssl.trust-store-type=
#
## Enable client authentication
server.ssl.client-auth=need

# List of allowed client common names (CNs)
allowed.client.common.names=

# No SSL for local development - to be enabled in cloud
server.ssl.enabled=false
server.port=8080

logging.level.root=info
logging.level.org.springframework.security=DEBUG